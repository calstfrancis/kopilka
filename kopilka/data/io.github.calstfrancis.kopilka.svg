<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#33d17a"/>
      <stop offset="100%" stop-color="#1e8a55"/>
    </linearGradient>
    <linearGradient id="pig_body" x1="0" y1="48" x2="0" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffd8cc"/>
      <stop offset="100%" stop-color="#ffb09a"/>
    </linearGradient>
    <linearGradient id="coin_g" x1="0" y1="20" x2="0" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffe97a"/>
      <stop offset="100%" stop-color="#f5a800"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Background plate -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <!-- Pig body -->
  <ellipse cx="63" cy="84" rx="37" ry="28" fill="url(#pig_body)" filter="url(#shadow)"/>

  <!-- Pig head -->
  <circle cx="91" cy="70" r="21" fill="url(#pig_body)" filter="url(#shadow)"/>

  <!-- Ear outer -->
  <ellipse cx="83" cy="51" rx="9" ry="11" fill="#ffb09a"/>
  <!-- Ear inner -->
  <ellipse cx="83" cy="54" rx="5" ry="7" fill="#ffd8cc"/>

  <!-- Tail -->
  <path d="M28 84 Q16 74 20 63 Q25 52 17 44"
        stroke="#ffb09a" stroke-width="4.5" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Snout -->
  <ellipse cx="110" cy="74" rx="11" ry="9" fill="#ffb09a"/>
  <circle cx="106" cy="74" r="2.8" fill="#c04030" opacity="0.55"/>
  <circle cx="114" cy="74" r="2.8" fill="#c04030" opacity="0.55"/>

  <!-- Eye -->
  <circle cx="97" cy="64" r="3.8" fill="#222"/>
  <circle cx="98.5" cy="62.5" r="1.3" fill="white"/>

  <!-- Coin slot -->
  <rect x="53" y="51" width="18" height="5" rx="2.5" fill="#1a7a48"/>

  <!-- Legs -->
  <rect x="34" y="103" width="12" height="16" rx="6" fill="#ffb09a"/>
  <rect x="50" y="103" width="12" height="16" rx="6" fill="#ffb09a"/>
  <rect x="66" y="103" width="12" height="16" rx="6" fill="#ffb09a"/>
  <rect x="82" y="103" width="12" height="16" rx="6" fill="#ffb09a"/>

  <!-- Coin dropping into slot -->
  <circle cx="62" cy="33" r="14" fill="url(#coin_g)" stroke="#c88000" stroke-width="1.5"
          filter="url(#shadow)"/>
  <text x="62" y="38.5" font-family="sans-serif" font-weight="900"
        font-size="15" text-anchor="middle" fill="#6b3c00">$</text>

  <!-- Dotted trajectory from coin to slot -->
  <line x1="62" y1="47" x2="62" y2="51" stroke="#1a7a48" stroke-width="2"
        stroke-dasharray="2,2" stroke-linecap="round" opacity="0.7"/>
</svg>
