app-id: io.github.calstfrancis.kopilka
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: kopilka

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --share=network
  - --talk-name=org.freedesktop.portal.Desktop

modules:
  - name: kopilka
    buildsystem: simple
    sources:
      - type: git
        url: https://github.com/calstfrancis/kopilka.git
        branch: main
      - type: file
        path: io.github.calstfrancis.kopilka.metainfo.xml
    build-commands:
      - pip3 install --prefix=/app --no-build-isolation .
      - install -Dm644 io.github.calstfrancis.kopilka.desktop /app/share/applications/io.github.calstfrancis.kopilka.desktop
      - install -Dm644 kopilka/data/io.github.calstfrancis.kopilka.svg /app/share/icons/hicolor/scalable/apps/io.github.calstfrancis.kopilka.svg
      - install -Dm644 io.github.calstfrancis.kopilka.metainfo.xml /app/share/metainfo/io.github.calstfrancis.kopilka.metainfo.xml
      - install -Dm644 kopilka/data/fonts/gosttypeb.ttf /app/share/fonts/gosttypeb.ttf
