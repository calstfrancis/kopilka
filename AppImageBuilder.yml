version: 1

script:
  - rm -rf AppDir || true
  - pip install --ignore-installed --prefix=/usr --root=AppDir .
  - mkdir -p AppDir/usr/share/applications
  - cp io.github.calstfrancis.kopilka.desktop AppDir/usr/share/applications/
  - mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps
  - cp kopilka/data/io.github.calstfrancis.kopilka.svg AppDir/usr/share/icons/hicolor/scalable/apps/

AppDir:
  path: ./AppDir

  app_info:
    id: io.github.calstfrancis.kopilka
    name: Kopilka
    icon: io.github.calstfrancis.kopilka
    version: !ENV ${APP_VERSION}
    exec: usr/bin/python3
    exec_args: "-m kopilka.kopilka $@"

  apt:
    arch: amd64
    sources:
      - sourceline: deb http://archive.ubuntu.com/ubuntu/ jammy main restricted universe multiverse
        key_url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x3b4fe6acc0b21f32
    include:
      - python3
      - python3-gi
      - python3-gi-cairo
      - gir1.2-gtk-4.0
      - gir1.2-adw-1
      - libgtk-4-1
      - libadwaita-1-0
      - libgirepository-1.0-1
      - gir1.2-pango-1.0
      - gir1.2-gdkpixbuf-2.0
      - librsvg2-common
      - adwaita-icon-theme
      - python3-cairo

  runtime:
    env:
      PYTHONPATH: '${APPDIR}/usr/lib/python3/dist-packages:${APPDIR}/usr/lib/python3.10/dist-packages'
      GI_TYPELIB_PATH: '${APPDIR}/usr/lib/x86_64-linux-gnu/girepository-1.0'
      XDG_DATA_DIRS: '${APPDIR}/usr/share:/usr/share'
      GSETTINGS_SCHEMA_DIR: '${APPDIR}/usr/share/glib-2.0/schemas'

AppImage:
  arch: x86_64
  update-information: gh-releases-zsync|calstfrancis|kopilka|latest|*x86_64.AppImage.zsync
  sign-key: None
  apt-prefix: /usr
